                    <div class="header-divider"></div>
                    <div>
                        <div class="title">Avances Coordinación de Tecnología</div>
                    </div>
                </div>

                <!-- Header Right: Theme Toggle & Badge -->
                <div class="header-right">
                    <button class="theme-toggle" id="theme-toggle" title="Cambiar modo" aria-label="Cambiar a modo oscuro">
                        <!-- Sun: shown in dark mode → click switches to light -->
                        <svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display: none;">
